<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Fund Raising </title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="reset.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>



    <!-- navbar -->
    <nav class="navbar">

        <!-- LOGO -->
        <div class="logo">
            <img src="images/Logo.png" alt="Logo">
        </div>

    </nav>
    <!-- end of navbar -->



    <section class="reset-section">

        <div class="reset-container">

            <!-- TOP IMAGE -->
            <div class="reset-image">
                <img src="images/Save icon.png" alt="reset image">
            </div>

            <!-- TITLE IMAGE -->
            <div class="reset-title-img">
                <img src="images/reset password text.png" alt="Reset Password">
            </div>

            <!-- TEXT IMAGE -->
            <div class="reset-text-img">
                <img src="images/textreset.png" alt="Reset instructions">
            </div>

            <!-- BUTTON IMAGE -->
            <div class="reset-btn-img">
                <img src="images/next icon.png" alt="Next button">
            </div>

        </div>

    </section>

</body>

</html>
