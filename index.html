<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Fund Raising </title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>



    <!-- navbar -->
    <nav class="navbar">

        <!-- LOGO -->
        <div class="logo">
            <img src="images/Logo.png" alt="Logo">
        </div>

    </nav>
    <!-- end of navbar -->



     <section class="reset-section">

    <div class="reset-container">

        <!-- TOP IMAGE -->
        <div class="reset-image" data-aos="fade-down">
            <img src="images/Save icon.png" alt="reset image">
        </div>

        <!-- TITLE IMAGE -->
        <div class="reset-title-img" data-aos="fade-up" data-aos-delay="100">
            <img src="images/reset password text.png" alt="Reset Password">
        </div>

        <!-- TEXT IMAGE -->
        <div class="reset-text-img" data-aos="fade-up" data-aos-delay="200">
            <img src="images/textreset.png" alt="Reset instructions">
        </div>

        <!-- BUTTON IMAGE -->
        <div class="reset-btn-img" data-aos="zoom-in" data-aos-delay="300">
            <img src="images/next icon.png" alt="Next button">
        </div>

    </div>

</section>




<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>

</body>

</html>
